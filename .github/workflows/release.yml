name: Master Checks (and Deploy)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  tag-and-publish:
    name: Tag and Publish to PyPI
    needs: checks
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout new tag
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          git fetch --tags
          git checkout ${{ steps.tag_version.outputs.new_tag }}

      - name: Set up Python
        if: steps.tag_version.outputs.new_tag != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        if: steps.tag_version.outputs.new_tag != ''
        uses: pypa/gh-action-pypi-publish@release/v1
